name: Build

on:
  workflow_dispatch:   # lets you trigger it manually from GitHub's UI
  push:
    tags:
      - "v*"            # also triggers automatically when you push a tag like v1.0

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]   # add ubuntu-latest / macos-latest later if you want those too

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}